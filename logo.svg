<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with cream color -->
  <circle cx="60" cy="60" r="58" fill="#F3E5D8" stroke="#8B7355" stroke-width="2"/>
  
  <!-- Wheat stalks in warm brown -->
  <g transform="translate(60, 60)">
    <!-- Main wheat stalk -->
    <path d="M0,-35 L0,25" stroke="#8B7355" stroke-width="3" fill="none"/>
    
    <!-- Left wheat grains -->
    <path d="M0,-30 C-8,-28 -12,-24 -15,-18" stroke="#8B7355" stroke-width="2" fill="none"/>
    <circle cx="-15" cy="-18" r="3" fill="#D4A574"/>
    <path d="M0,-25 C-10,-22 -14,-18 -17,-12" stroke="#8B7355" stroke-width="2" fill="none"/>
    <circle cx="-17" cy="-12" r="3" fill="#D4A574"/>
    <path d="M0,-20 C-12,-16 -16,-12 -19,-6" stroke="#8B7355" stroke-width="2" fill="none"/>
    <circle cx="-19" cy="-6" r="3" fill="#D4A574"/>
    <path d="M0,-15 C-14,-10 -18,-6 -21,0" stroke="#8B7355" stroke-width="2" fill="none"/>
    <circle cx="-21" cy="0" r="3" fill="#D4A574"/>
    
    <!-- Right wheat grains -->
    <path d="M0,-30 C8,-28 12,-24 15,-18" stroke="#8B7355" stroke-width="2" fill="none"/>
    <circle cx="15" cy="-18" r="3" fill="#D4A574"/>
    <path d="M0,-25 C10,-22 14,-18 17,-12" stroke="#8B7355" stroke-width="2" fill="none"/>
    <circle cx="17" cy="-12" r="3" fill="#D4A574"/>
    <path d="M0,-20 C12,-16 16,-12 19,-6" stroke="#8B7355" stroke-width="2" fill="none"/>
    <circle cx="19" cy="-6" r="3" fill="#D4A574"/>
    <path d="M0,-15 C14,-10 18,-6 21,0" stroke="#8B7355" stroke-width="2" fill="none"/>
    <circle cx="21" cy="0" r="3" fill="#D4A574"/>
    
    <!-- Small decorative leaves -->
    <path d="M-8,-10 Q-12,-8 -10,-4" stroke="#8B7355" stroke-width="1.5" fill="none"/>
    <path d="M8,-10 Q12,-8 10,-4" stroke="#8B7355" stroke-width="1.5" fill="none"/>
    
    <!-- Bottom wheat detail -->
    <path d="M0,25 C-3,28 -3,32 0,35 C3,32 3,28 0,25" fill="#8B7355"/>
  </g>
  
  <!-- Brand text -->
  <text x="60" y="95" text-anchor="middle" font-family="serif" font-size="12" fill="#8B7355" font-weight="600">
    MC
  </text>
</svg>
